<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图书投票</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Book Vote MVP</p>
        <h1>图书投票</h1>
        <p class="hero-description">从候选书单中选择你最想推荐的一本书，点击按钮即可完成投票。</p>
      </header>

      <section class="auth-panel" aria-labelledby="authTitle">
        <div class="auth-summary">
          <div>
            <h2 id="authTitle">用户状态</h2>
            <p id="authSummaryText">正在检查登录状态...</p>
          </div>
          <div id="authActions" class="auth-actions">
            <button id="showLoginButton" class="secondary-button" type="button">登录</button>
            <button id="showRegisterButton" class="secondary-button" type="button">注册</button>
            <button id="showForgotPasswordButton" class="secondary-button" type="button">忘记密码</button>
            <button id="showChangePasswordButton" class="secondary-button" type="button" hidden>修改密码</button>
            <button id="showRecoverySettingsButton" class="secondary-button" type="button" hidden>设置找回凭证</button>
            <button id="showAdminButton" class="secondary-button" type="button" hidden>后台管理</button>
            <button id="logoutButton" class="secondary-button" type="button" hidden>退出登录</button>
          </div>
        </div>

        <div class="auth-forms">
          <form id="loginForm" class="auth-form" hidden>
            <h3>登录</h3>
            <label>
              用户名
              <input id="loginUsername" name="username" type="text" autocomplete="username" required>
            </label>
            <label>
              密码
              <span class="password-field">
                <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
                <button class="password-toggle" type="button" data-toggle-password="loginPassword" aria-controls="loginPassword" aria-pressed="false">显示</button>
              </span>
            </label>
            <div class="form-actions">
              <button class="vote-button" type="submit">登录</button>
              <button class="secondary-button" type="button" data-auth-cancel>取消</button>
            </div>
          </form>

          <form id="registerForm" class="auth-form" hidden>
            <h3>注册</h3>
            <label>
              用户名
              <input id="registerUsername" name="username" type="text" autocomplete="username" required>
            </label>
            <label>
              E-mail
              <input id="registerEmail" name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              密码
              <span class="password-field">
                <input id="registerPassword" name="password" type="password" autocomplete="new-password" required>
                <button class="password-toggle" type="button" data-toggle-password="registerPassword" aria-controls="registerPassword" aria-pressed="false">显示</button>
              </span>
            </label>
            <label>
              确认密码
              <span class="password-field">
                <input id="registerConfirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required>
                <button class="password-toggle" type="button" data-toggle-password="registerConfirmPassword" aria-controls="registerConfirmPassword" aria-pressed="false">显示</button>
              </span>
            </label>
            <label>
              找回问题
              <input id="registerRecoveryQuestion" name="recoveryQuestion" type="text" maxlength="120" placeholder="例如：我最喜欢的一本书是什么？" required>
            </label>
            <label>
              找回答案
              <span class="password-field">
                <input id="registerRecoveryAnswer" name="recoveryAnswer" type="password" maxlength="128" autocomplete="off" required>
                <button class="password-toggle" type="button" data-toggle-password="registerRecoveryAnswer" aria-controls="registerRecoveryAnswer" aria-pressed="false">显示</button>
              </span>
            </label>
            <div class="form-actions">
              <button class="vote-button" type="submit">注册</button>
              <button class="secondary-button" type="button" data-auth-cancel>取消</button>
            </div>
          </form>

          <form id="changePasswordForm" class="auth-form" hidden>
            <h3>修改密码</h3>
            <label>
              当前密码
              <span class="password-field">
                <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required>
                <button class="password-toggle" type="button" data-toggle-password="currentPassword" aria-controls="currentPassword" aria-pressed="false">显示</button>
              </span>
            </label>
            <label>
              新密码
              <span class="password-field">
                <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required>
                <button class="password-toggle" type="button" data-toggle-password="newPassword" aria-controls="newPassword" aria-pressed="false">显示</button>
              </span>
            </label>
            <label>
              确认新密码
              <span class="password-field">
                <input id="confirmNewPassword" name="confirmNewPassword" type="password" autocomplete="new-password" required>
                <button class="password-toggle" type="button" data-toggle-password="confirmNewPassword" aria-controls="confirmNewPassword" aria-pressed="false">显示</button>
              </span>
            </label>
            <div class="form-actions">
              <button class="vote-button" type="submit">保存新密码</button>
              <button class="secondary-button" type="button" data-auth-cancel>取消</button>
            </div>
          </form>

          <form id="recoverySettingsForm" class="auth-form" hidden>
            <h3>设置找回密码凭证</h3>
            <label>
              E-mail
              <input id="recoverySettingsEmail" name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              找回问题
              <input id="recoverySettingsQuestion" name="recoveryQuestion" type="text" maxlength="120" placeholder="例如：我最喜欢的一本书是什么？" required>
            </label>
            <label>
              找回答案
              <span class="password-field">
                <input id="recoverySettingsAnswer" name="recoveryAnswer" type="password" maxlength="128" autocomplete="off" required>
                <button class="password-toggle" type="button" data-toggle-password="recoverySettingsAnswer" aria-controls="recoverySettingsAnswer" aria-pressed="false">显示</button>
              </span>
            </label>
            <div class="form-actions">
              <button class="vote-button" type="submit">保存找回凭证</button>
              <button class="secondary-button" type="button" data-auth-cancel>取消</button>
            </div>
          </form>

          <form id="forgotPasswordForm" class="auth-form" hidden>
            <h3>找回密码</h3>
            <label>
              要重置的用户名
              <input id="forgotAccount" name="account" type="text" autocomplete="username" required>
            </label>
            <label>
              接收验证码的 E-mail
              <input id="forgotEmail" name="email" type="email" autocomplete="email" placeholder="receiver@example.com">
            </label>
            <div class="form-actions">
              <button id="sendPasswordResetCodeButton" class="secondary-button" type="button">发送邮箱验证码</button>
              <button id="loadRecoveryQuestionButton" class="secondary-button" type="button">使用找回问题</button>
            </div>
            <p id="passwordResetCodeText" class="form-note">输入用户名和任意接收邮箱后发送验证码；验证码 10 分钟内有效，输错 3 次后失效。</p>
            <label>
              邮箱验证码
              <input id="forgotEmailCode" name="code" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="6 位数字验证码">
            </label>
            <p id="recoveryQuestionText" class="form-note">如无法接收邮件，可只输入用户名后使用找回问题。</p>
            <label>
              找回答案
              <span class="password-field">
                <input id="forgotRecoveryAnswer" name="recoveryAnswer" type="password" maxlength="128" autocomplete="off">
                <button class="password-toggle" type="button" data-toggle-password="forgotRecoveryAnswer" aria-controls="forgotRecoveryAnswer" aria-pressed="false">显示</button>
              </span>
            </label>
            <label>
              新密码
              <span class="password-field">
                <input id="forgotNewPassword" name="newPassword" type="password" autocomplete="new-password" required>
                <button class="password-toggle" type="button" data-toggle-password="forgotNewPassword" aria-controls="forgotNewPassword" aria-pressed="false">显示</button>
              </span>
            </label>
            <label>
              确认新密码
              <span class="password-field">
                <input id="forgotConfirmNewPassword" name="confirmNewPassword" type="password" autocomplete="new-password" required>
                <button class="password-toggle" type="button" data-toggle-password="forgotConfirmNewPassword" aria-controls="forgotConfirmNewPassword" aria-pressed="false">显示</button>
              </span>
            </label>
            <div class="form-actions">
              <button class="vote-button" type="submit">重置密码</button>
              <button class="secondary-button" type="button" data-auth-cancel>取消</button>
            </div>
          </form>
        </div>
      </section>

      <section class="status-panel" aria-live="polite">
        <div id="statusMessage" class="status-message">正在加载图书列表...</div>
      </section>

      <section id="adminPanel" class="admin-panel" aria-labelledby="adminTitle" hidden>
        <div class="section-heading">
          <div>
            <h2 id="adminTitle">后台图书管理</h2>
            <p class="admin-description">管理员可以维护书名、作者、简介、封面，并调整候选图书数量。</p>
          </div>
          <div class="admin-row-actions">
            <button id="startVoteRoundButton" class="secondary-button" type="button">发起新一轮投票</button>
            <button id="refreshBookCoversButton" class="secondary-button" type="button">刷新真实封面</button>
            <button id="adminRefreshButton" class="secondary-button" type="button">刷新后台数据</button>
          </div>
        </div>

        <form id="adminCreateBookForm" class="admin-create-form">
          <label>
            新图书书名
            <input id="adminNewBookTitle" name="title" type="text" maxlength="80" required>
          </label>
          <label>
            新图书作者
            <input id="adminNewBookAuthor" name="author" type="text" maxlength="80" required>
          </label>
          <label>
            新图书简介（可联网抓取）
            <textarea id="adminNewBookDescription" name="description" maxlength="300" rows="3" placeholder="留空时系统根据书名和作者联网抓取真实简介"></textarea>
          </label>
          <label>
            新图书封面地址（可联网抓取）
            <input id="adminNewBookCoverUrl" name="coverUrl" type="text" maxlength="300" placeholder="留空时系统联网抓取真实封面，失败时兜底">
          </label>
          <button class="vote-button" type="submit">新增图书</button>
        </form>

        <div id="adminBookList" class="admin-book-list"></div>
      </section>

      <section aria-labelledby="bookListTitle">
        <div class="section-heading">
          <h2 id="bookListTitle">候选图书</h2>
          <button id="refreshButton" class="secondary-button" type="button">刷新票数</button>
        </div>
        <div id="bookList" class="book-grid"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
